name = "tgd-incidents"
main = "src/index.js"
compatibility_date = "2026-07-01"
workers_dev = false
preview_urls = false

# Cron prunes the feed to the archive window and polls X on the quarter hour.
[triggers]
crons = ["*/5 * * * *"]

# Non-secret config. Secrets are set with `wrangler secret put`, never committed:
#   ADMIN_TOKEN    admin-panel API secret
#   INGEST_TOKEN   separate machine-only incident ingestion secret
#   GITHUB_TOKEN   fine-grained PAT, Actions: Read and write + Contents: Read
#   X_BEARER_TOKEN optional, only if X auto-import is wanted
#   SAFEPAY_SECRET_KEY             creates Monitoring Desk checkouts
#   SAFEPAY_WEBHOOK_SECRET         verifies Safepay webhooks
#   CONTENT_DUMP_TOKEN             protects Monitoring content during builds
#   GEMINI_API_KEY                 powers the Explorer research assistant
[vars]
X_USERNAME = "Global_Decipher"
GITHUB_REPO = "globaldecipher/globaldecipher.github.io"
GITHUB_BRANCH = "main"
SITE_URL = "https://theglobaldecipher.com"
GEMINI_MODEL = "gemini-3.1-flash-lite"
GEMINI_FALLBACK_MODEL = "gemini-2.5-flash"
GEMINI_REQUEST_TIMEOUT_MS = "12000"
ASK_TOTAL_TIMEOUT_MS = "15000"
# Conservative caps keep the public assistant practical on Gemini's free tier.
ASK_HOURLY_LIMIT = "8"
ASK_GLOBAL_DAILY_LIMIT = "400"
# Safepay sandbox plan created for the Monitoring Desk.
SAFEPAY_PLAN_ID = "plan_06e4e6c9-c108-456e-a746-777036fc7553"
SAFEPAY_ENVIRONMENT = "sandbox"
SAFEPAY_API_BASE = "https://sandbox.api.getsafepay.com"

[observability]
enabled = true

# Account-level, durable rate limits for sensitive and public endpoints.
[[ratelimits]]
name = "ADMIN_RATE_LIMITER"
namespace_id = "1001"

[ratelimits.simple]
limit = 20
period = 60

[[ratelimits]]
name = "PUBLIC_RATE_LIMITER"
namespace_id = "1002"

[ratelimits.simple]
limit = 12
period = 60

[[ratelimits]]
name = "WEBHOOK_RATE_LIMITER"
namespace_id = "1003"

[ratelimits.simple]
limit = 120
period = 60

# KV namespace that stores the incident feed + Telegram poll state.
# Replace the placeholder id after running:
#   wrangler kv namespace create INCIDENTS
[[kv_namespaces]]
binding = "INCIDENTS"
id = "e57a43705200465a985ccf86ae4d4a0f"

# D1 database for articles, profiles, and pages.
# Replaces the old GitHub-backed content store.
[[d1_databases]]
binding = "CONTENT_DB"
database_name = "tgd-content"
database_id = "f73c5100-c9fd-41b3-9e20-d6f1986ad5b4"
migrations_dir = "migrations"

# Report files, charts, diagrams, and article images. The bucket will be
# created and connected only after the local preview is approved.
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "tgd-media"

# Serve the feed and uploaded research media from the production domain.
# A Workers route takes precedence over Pages for matching paths.
[[routes]]
pattern = "theglobaldecipher.com/api/*"
zone_name = "theglobaldecipher.com"

[[routes]]
pattern = "theglobaldecipher.com/media/*"
zone_name = "theglobaldecipher.com"
