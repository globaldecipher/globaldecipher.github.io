version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      site-dependencies:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /worker
    schedule:
      interval: weekly
    groups:
      worker-dependencies:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /apps/explorer
    schedule:
      interval: weekly
    groups:
      explorer-dependencies:
        patterns:
          - "*"
