name: Build and deploy to Cloudflare Pages
description: Build the static site with build.mjs and deploy it to Cloudflare Pages via direct upload.

inputs:
  api-token:
    description: Cloudflare API token with the Cloudflare Pages Edit permission.
    required: true
  account-id:
    description: Cloudflare account ID.
    required: true
  project-name:
    description: Cloudflare Pages project name.
    required: false
    default: theglobaldecipher
  content-dump-token:
    description: Optional private token used by build.mjs to fetch protected Monitoring content.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install site dependencies
      shell: bash
      run: npm ci --no-audit --no-fund

    - name: Install Worker deployment dependencies
      shell: bash
      working-directory: worker
      run: npm ci --no-audit --no-fund

    - name: Build static site through remote D1
      shell: bash
      env:
        CLOUDFLARE_API_TOKEN: ${{ inputs.api-token }}
        CLOUDFLARE_ACCOUNT_ID: ${{ inputs.account-id }}
      run: |
        preview_log="$RUNNER_TEMP/tgd-content-preview.log"
        ./worker/node_modules/.bin/wrangler dev \
          --config worker/wrangler.build.toml \
          --remote \
          --ip 127.0.0.1 \
          --port 8787 \
          --log-level error >"$preview_log" 2>&1 &
        preview_pid=$!
        trap 'kill "$preview_pid" 2>/dev/null || true' EXIT

        ready=0
        for attempt in {1..20}; do
          if curl --fail --silent http://127.0.0.1:8787/health >/dev/null; then
            ready=1
            break
          fi
          sleep 1
        done
        if [ "$ready" -ne 1 ]; then
          cat "$preview_log"
          exit 1
        fi

        CONTENT_API=http://127.0.0.1:8787/api node build.mjs

    - name: Install Explorer dependencies
      shell: bash
      working-directory: apps/explorer
      run: npm ci --no-audit --no-fund

    - name: Build Explorer into site/network-graph
      shell: bash
      working-directory: apps/explorer
      run: npm run build

    - name: Deploy to Cloudflare Pages
      shell: bash
      env:
        CLOUDFLARE_API_TOKEN: ${{ inputs.api-token }}
        CLOUDFLARE_ACCOUNT_ID: ${{ inputs.account-id }}
      run: ./worker/node_modules/.bin/wrangler pages deploy site --project-name="${{ inputs.project-name }}" --branch=main
