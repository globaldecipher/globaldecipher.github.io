name: Build and deploy to Cloudflare Pages
description: Build the static site with build.mjs and deploy it to Cloudflare Pages via direct upload.

inputs:
  api-token:
    description: Cloudflare API token with the Cloudflare Pages Edit permission.
    required: true
  account-id:
    description: Cloudflare account ID.
    required: true
  project-name:
    description: Cloudflare Pages project name.
    required: false
    default: theglobaldecipher
  content-dump-token:
    description: Optional private token used by build.mjs to fetch protected Monitoring content.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install site dependencies
      shell: bash
      run: npm ci --no-audit --no-fund

    - name: Install Worker deployment dependencies
      shell: bash
      working-directory: worker
      run: npm ci --no-audit --no-fund

    - name: Build static site
      shell: bash
      env:
        CONTENT_DUMP_TOKEN: ${{ inputs.content-dump-token }}
      run: node build.mjs

    - name: Install Explorer dependencies
      shell: bash
      working-directory: apps/explorer
      run: npm ci --no-audit --no-fund

    - name: Build Explorer into site/network-graph
      shell: bash
      working-directory: apps/explorer
      run: npm run build

    - name: Deploy to Cloudflare Pages
      shell: bash
      env:
        CLOUDFLARE_API_TOKEN: ${{ inputs.api-token }}
        CLOUDFLARE_ACCOUNT_ID: ${{ inputs.account-id }}
      run: ./worker/node_modules/.bin/wrangler pages deploy site --project-name="${{ inputs.project-name }}" --branch=main
