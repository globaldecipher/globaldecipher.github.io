name: Publish TGD content from form

on:
  issues:
    types:
      - opened
      - edited
      - reopened

permissions:
  contents: write
  issues: write

jobs:
  publish:
    if: contains(github.event.issue.labels.*.name, 'content-upload') && !contains(github.event.issue.labels.*.name, 'published')
    runs-on: ubuntu-latest
    steps:
      - name: Check publisher permission
        id: permission
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.event.issue.user.login }}
          ISSUE: ${{ github.event.issue.number }}
        run: |
          permission="$(gh api "repos/$REPO/collaborators/$ACTOR/permission" --jq .permission 2>/dev/null || echo none)"
          case "$permission" in
            admin|maintain|write)
              echo "$ACTOR can publish content."
              ;;
            *)
              gh issue comment "$ISSUE" --repo "$REPO" --body "I could not publish this because @$ACTOR does not have write permission on this repository."
              exit 1
              ;;
          esac

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Create website article
        id: make
        run: node .github/scripts/publish-content-from-issue.mjs

      - name: Commit article
        id: commit
        env:
          CONTENT_TITLE: ${{ steps.make.outputs.content_title }}
        run: |
          if [ -z "$(git status --porcelain content)" ]; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content
          git commit -m "Publish content: $CONTENT_TITLE"
          git push
          echo "committed=true" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloudflare Pages
        if: steps.commit.outputs.committed == 'true'
        uses: ./.github/actions/deploy-cloudflare
        with:
          api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Mark issue as published
        if: steps.commit.outputs.committed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ISSUE: ${{ github.event.issue.number }}
          CONTENT_PATH: ${{ steps.make.outputs.content_path }}
          CONTENT_TITLE: ${{ steps.make.outputs.content_title }}
        run: |
          gh issue comment "$ISSUE" --repo "$REPO" --body "Published **$CONTENT_TITLE** as \`$CONTENT_PATH\`. The website will rebuild automatically in a minute or two."
          gh issue edit "$ISSUE" --repo "$REPO" --add-label "published"
          gh issue close "$ISSUE" --repo "$REPO" --comment "Done."

      - name: Explain form problem
        if: failure() && steps.permission.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ISSUE: ${{ github.event.issue.number }}
        run: |
          gh issue comment "$ISSUE" --repo "$REPO" --body "This did not publish. Please check that the form has a title, date in YYYY-MM-DD format, summary, region, and article body."
