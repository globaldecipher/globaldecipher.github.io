name: Update incident tracker from X

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: x-incident-monitor
  cancel-in-progress: false

jobs:
  update-from-x:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Update feed from X posts
        id: xfeed
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          X_USERNAME: Global_Decipher
        run: |
          if [ -z "$X_BEARER_TOKEN" ]; then
            echo "X_BEARER_TOKEN is not configured; skipping."
            echo "added_count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          node .github/scripts/update-incidents-from-x.mjs

      - name: Commit incident feed
        if: steps.xfeed.outputs.changed_count != '0'
        run: |
          if [ -z "$(git status --porcelain static/data/incidents.json)" ]; then
            echo "No incident feed changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add static/data/incidents.json
          git commit -m "Update incident tracker from X"
          git push
