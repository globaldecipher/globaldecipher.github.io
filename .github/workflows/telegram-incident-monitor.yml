name: Update incident tracker from Telegram

on:
  push:
    paths:
      - '.github/workflows/telegram-incident-monitor.yml'
      - '.github/scripts/update-incidents-from-telegram.mjs'
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: telegram-incident-monitor
  cancel-in-progress: false

jobs:
  update-from-telegram:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Update feed from Telegram channel
        id: telegramfeed
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: '-1003994704651'
          TELEGRAM_DEBUG: ${{ github.event_name != 'schedule' }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then
            echo 'TELEGRAM_BOT_TOKEN is not configured; skipping.'
            echo 'added_count=0' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          node .github/scripts/update-incidents-from-telegram.mjs

      - name: Commit Telegram feed updates
        id: commit
        run: |
          if [ -n "$(git status --porcelain static/data/incidents.json)" ]; then
            echo 'site_changed=true' >> "$GITHUB_OUTPUT"
          else
            echo 'site_changed=false' >> "$GITHUB_OUTPUT"
          fi
          if [ -z "$(git status --porcelain static/data/incidents.json static/data/telegram-state.json static/data/telegram-debug.json)" ]; then
            echo 'No Telegram feed changes.'
            echo 'changed=false' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add static/data/incidents.json static/data/telegram-state.json static/data/telegram-debug.json
          git commit -m 'Update incident tracker from Telegram'
          git push
          echo 'changed=true' >> "$GITHUB_OUTPUT"

      - name: Build static site
        if: steps.commit.outputs.site_changed == 'true'
        run: node build.mjs

      - name: Configure GitHub Pages
        if: steps.commit.outputs.site_changed == 'true'
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        if: steps.commit.outputs.site_changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        if: steps.commit.outputs.site_changed == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
