name: Update incident tracker from Telegram

on:
  push:
    paths:
      - '.github/workflows/telegram-incident-monitor.yml'
      - '.github/scripts/update-incidents-from-telegram.mjs'
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: telegram-incident-monitor
  cancel-in-progress: false

jobs:
  update-from-telegram:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Update feed from Telegram channel
        id: telegramfeed
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: '-1003994704651'
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then
            echo 'TELEGRAM_BOT_TOKEN is not configured; skipping.'
            echo 'added_count=0' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          node .github/scripts/update-incidents-from-telegram.mjs

      - name: Commit Telegram feed updates
        run: |
          if [ -z "$(git status --porcelain static/data/incidents.json static/data/telegram-state.json static/data/telegram-debug.json)" ]; then
            echo 'No Telegram feed changes.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add static/data/incidents.json static/data/telegram-state.json static/data/telegram-debug.json
          git commit -m 'Update incident tracker from Telegram'
          git push
