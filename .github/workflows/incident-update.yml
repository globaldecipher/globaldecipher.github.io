name: Update incident tracker from form

on:
  issues:
    types:
      - opened
      - edited
      - reopened

permissions:
  contents: read
  issues: write

jobs:
  update-tracker:
    if: contains(github.event.issue.labels.*.name, 'incident-update') && !contains(github.event.issue.labels.*.name, 'incident-published')
    runs-on: ubuntu-latest
    steps:
      - name: Check publisher permission
        id: permission
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.event.issue.user.login }}
          ISSUE: ${{ github.event.issue.number }}
        run: |
          permission="$(gh api "repos/$REPO/collaborators/$ACTOR/permission" --jq .permission 2>/dev/null || echo none)"
          case "$permission" in
            admin|maintain|write)
              echo "$ACTOR can update the incident tracker."
              ;;
            *)
              gh issue comment "$ISSUE" --repo "$REPO" --body "I could not update the incident tracker because @$ACTOR does not have write permission on this repository."
              exit 1
              ;;
          esac

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Parse incident from form
        id: make
        run: node .github/scripts/add-incident-from-issue.mjs

      - name: Send incident to the feed Worker
        id: ingest
        env:
          WORKER_INGEST_URL: ${{ secrets.WORKER_INGEST_URL }}
          INGEST_TOKEN: ${{ secrets.TGD_INGEST_TOKEN }}
          PAYLOAD: ${{ steps.make.outputs.incident_payload }}
        run: |
          if [ -z "$WORKER_INGEST_URL" ] || [ -z "$INGEST_TOKEN" ]; then
            echo "::error::WORKER_INGEST_URL and TGD_INGEST_TOKEN secrets must be set so the form can reach the incident Worker."
            exit 1
          fi
          response="$(curl -sS -w '\n%{http_code}' -X POST "$WORKER_INGEST_URL" \
            -H "authorization: Bearer $INGEST_TOKEN" \
            -H "content-type: application/json" \
            --data-binary "@$PAYLOAD")"
          body="$(echo "$response" | head -n -1)"
          code="$(echo "$response" | tail -n 1)"
          echo "Worker responded $code: $body"
          if [ "$code" != "200" ]; then
            echo "::error::Worker ingest failed (HTTP $code)."
            exit 1
          fi
          total="$(echo "$body" | node -e 'let s="";process.stdin.on("data",d=>s+=d).on("end",()=>{try{console.log(JSON.parse(s).total||"")}catch{console.log("")}})')"
          echo "incident_count=$total" >> "$GITHUB_OUTPUT"

      - name: Mark incident as published
        if: steps.ingest.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ISSUE: ${{ github.event.issue.number }}
          INCIDENT_TITLE: ${{ steps.make.outputs.incident_title }}
          INCIDENT_ID: ${{ steps.make.outputs.incident_id }}
          INCIDENT_COUNT: ${{ steps.ingest.outputs.incident_count }}
        run: |
          gh issue comment "$ISSUE" --repo "$REPO" --body "Added **$INCIDENT_TITLE** to the live incident feed as \`$INCIDENT_ID\`. The feed now has $INCIDENT_COUNT incidents and the map updates within a minute (no rebuild needed)."
          gh issue edit "$ISSUE" --repo "$REPO" --add-label "incident-published"
          gh issue close "$ISSUE" --repo "$REPO" --comment "Done."

      - name: Explain form problem
        if: failure() && steps.permission.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ISSUE: ${{ github.event.issue.number }}
        run: |
          gh issue comment "$ISSUE" --repo "$REPO" --body "This did not update the incident tracker. Please check the required fields, use YYYY-MM-DD for the date, and keep casualty fields numeric."
