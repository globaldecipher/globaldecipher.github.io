name: Security checks

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            worker/package-lock.json
            apps/explorer/package-lock.json

      - name: Install locked dependencies
        run: |
          npm ci --no-audit --no-fund
          npm ci --prefix worker --no-audit --no-fund
          npm ci --prefix apps/explorer --no-audit --no-fund

      - name: Reject high-risk dependency findings
        run: |
          npm audit --audit-level=high
          npm audit --prefix worker --audit-level=high
          npm audit --prefix apps/explorer --audit-level=high

      - name: Check JavaScript syntax
        run: |
          node --check build.mjs
          find worker/src worker/test static .github/scripts -type f \( -name '*.js' -o -name '*.mjs' \) -print0 | xargs -0 -n1 node --check

      - name: Run Worker tests
        run: npm test --prefix worker

      - name: Build the complete site
        env:
          ALLOW_PARTIAL_CONTENT_BUILD: "1"
        run: npm run build
